title: Smart Money Path
description: >-
  Practical personal finance for beginners. Learn budgeting, saving, investing,
  credit building, and side hustles to build real wealth step by step.
url: "https://pvega23.github.io"
baseurl: "/finance-blog"
author:
  name: Smart Money Path
  email: ""

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Permalink structure (SEO-friendly)
permalink: /:categories/:title/

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Smart Money Path"

# Pagination
paginate: 10
paginate_path: "/page/:num/"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - affiliate_links.json
  - README.md

# Analytics (add your Google Analytics ID)
google_analytics: ""

# AdSense (add your AdSense publisher ID)
google_adsense: ""

# Social
social:
  github: "https://github.com/pvega23"
